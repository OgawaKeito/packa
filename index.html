<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packa | 旅の準備を爆速にする共有荷造りリスト</title>

    <meta name="description" content="Packaは宿泊数や目的地に合わせて持ち物リストを自動生成し、URL一つで仲間と共有・編集できるパッキングツールです。">
    <meta property="og:title" content="Packa | 旅の準備を爆速にする共有荷造りリスト">
    <meta property="og:image" content="ogp-image.png">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

<div id="app" class="card">
    <h1 @click="resetToSetup">📦 Packa</h1>

    <div v-if="mode === 'setup'">
        <h3>旅の予定を入力してください</h3>
        <div class="tabs">
            <button :class="{ active: currentScope === 'domestic' }" @click="currentScope = 'domestic'">国内旅行</button>
            <button :class="{ active: currentScope === 'overseas' }" @click="currentScope = 'overseas'">海外旅行</button>
        </div>
        <div class="input-group">
            宿泊数: <input type="number" v-model="stayDays" min="0"> 泊
        </div>
        
        <button class="btn btn-primary" @click="generateList">おすすめリストを作成</button>
        <button class="btn btn-outline" @click="createEmptyList" style="margin-top: 10px;">自分で0から作成する</button>
    </div>

    <div v-else>
        <div class="info-badge">
            {{ currentScope === 'domestic' ? '国内' : '海外' }} / {{ stayDays }}泊 
            <span v-if="mode === 'view'">(共有モード)</span>
        </div>
        
        <div v-if="mode !== 'setup'" class="add-box">
            <input type="text" ref="addInput" v-model="newItemName" placeholder="アイテムを追加..." @keyup.enter="addItem">
            <button @click="addItem">＋</button>
        </div>

        <ul id="sort-list" class="item-list">
            <li v-for="(item, index) in items" :key="item.item_name" class="item">
                <div class="item-content">
                    <span class="drag-handle">⣿</span>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" v-model="item.checked">
                        <span class="custom-check"></span>
                        <span class="item-text" :class="{ checked: item.checked }">{{ item.item_name }}</span>
                    </label>
                </div>
                <button class="delete-btn" @click="removeItem(index)" title="削除">×</button>
            </li>
        </ul>        
        <div v-if="mode === 'list'">
            <button class="btn btn-success" @click="saveList" :disabled="processing">
                {{ processing ? '保存中...' : 'URLを発行して保存' }}
            </button>
        <div v-if="shareUrl" class="share-box">
            <p class="share-title">🔗 共有URL（このURLを仲間に送る）：</p>
            <div class="url-copy-wrapper">
                <input type="text" class="url-input" readonly :value="shareUrl" @click="$event.target.select()">
                
                <a :href="shareUrl" target="_blank" class="btn-open">開く</a>
                
                <button class="btn-copy" @click="copyToClipboard" :class="{ copied: copyStatus }">
                    {{ copyStatus ? '完了' : 'コピー' }}
                </button>
            </div>
        </div>
        </div>

        <div v-if="mode === 'view'">
            <button class="btn btn-success" @click="updateList" :disabled="processing">
                {{ processing ? '更新中...' : 'チェック状態を保存する' }}
            </button>
            <p v-if="statusMsg" class="status-msg">{{ statusMsg }}</p>
            <button class="btn btn-outline" @click="resetToSetup">新しくリストを作る</button>
        </div>
    </div>

    <footer>
        <p><a href="#" @click.prevent="showTerms = true">利用規約</a></p>
        <p>&copy; 2024 Packa Project.</p>
        <p>v2.0</p>
    </footer>

    <div v-if="showTerms" class="modal-overlay" @click.self="showTerms = false">
        <div class="modal-content">
            <span class="modal-close" @click="showTerms = false">&times;</span>
            <h3>利用規約</h3>
            <div class="terms-text">
                <p><strong>1. サービスの概要</strong><br>Packaは旅行の持ち物リストを作成・共有するツールです。</p>
                <p><strong>2. 免責事項</strong><br>本サービスの使用によるトラブルについて、運営者は責任を負いません。</p>
            </div>
            <button class="btn btn-primary" @click="showTerms = false">閉じる</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
